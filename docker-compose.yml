version: "3.8"

services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  app1:
    build: .
    container_name: app1
    ports:
      - "8080:8080"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8080
    depends_on:
      - redis

  app2:
    build: .
    container_name: app2
    ports:
      - "8081:8081"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8081
    depends_on:
      - redis